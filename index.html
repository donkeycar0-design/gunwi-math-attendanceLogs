<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>군위몰입수학 출결관리</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="몰입수학">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #F5F6FA; color: #0f172a; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100dvh; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, select { font-family: inherit; }
    table { border-collapse: collapse; width: 100%; }

    /* ── 레이아웃 ── */
    .app-shell { display: flex; height: 100dvh; overflow: hidden; }
    .sidebar {
        width: 240px; min-width: 240px; background: #fff;
        border-right: 1px solid #f1f5f9; display: flex; flex-direction: column;
        padding: 24px 20px; z-index: 50; transition: transform .3s ease;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; margin-top: 4px; }
    .logo-icon { width: 44px; height: 44px; background: #0f172a; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fb923c; transform: rotate(-3deg); flex-shrink: 0; }
    .logo-title { font-size: 15px; font-weight: 900; color: #0f172a; line-height: 1.1; }
    .logo-sub   { font-size: 9px; font-weight: 900; color: #f97316; letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; }
    .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 16px; font-size: 13px; font-weight: 900; color: #94a3b8; transition: all .2s; width: 100%; text-align: left; }
    .nav-btn:hover { background: #f8fafc; color: #475569; }
    .nav-btn.active-orange { background: #f97316; color: #fff; }
    .nav-btn.active-dark   { background: #0f172a; color: #fff; }
    .nav-btn.active-indigo { background: #6366f1; color: #fff; }
    .sidebar-footer { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .refresh-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 14px; font-size: 11px; font-weight: 700; color: #94a3b8; transition: background .2s; width: 100%; }
    .refresh-btn:hover { background: #f8fafc; }
    .db-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 14px; padding: 10px 14px; }
    .db-card-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
    .db-card-val { font-size: 11px; font-weight: 700; color: #64748b; }
    .db-card-sub { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    .main { flex: 1; overflow-y: auto; padding: 36px 40px; }
    .main-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .header-eyebrow { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .15em; margin-bottom: 4px; }
    .header-title { font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: -.03em; }
    .date-picker-bar { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #f1f5f9; border-radius: 16px; padding: 10px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .date-picker-bar input[type="date"] { font-size: 13px; font-weight: 900; color: #475569; border: none; outline: none; background: transparent; }
    .date-divider { width: 1px; height: 14px; background: #e2e8f0; }
    .day-badge { font-size: 13px; font-weight: 900; color: #f97316; }
    .mobile-menu-btn { display: none; position: fixed; top: 14px; right: 14px; z-index: 60; width: 44px; height: 44px; background: #0f172a; color: #fff; border-radius: 14px; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 40; backdrop-filter: blur(4px); }

    /* ── 그리드 ── */
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    /* ── 카드 ── */
    .card { background: #fff; border: 1px solid #f1f5f9; border-radius: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .stat-card { padding: 20px; }
    .stat-label { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
    .stat-val { font-size: 32px; font-weight: 900; }

    /* ── 분반 카드 ── */
    .class-card { background: #fff; border: 1px solid #f1f5f9; border-radius: 28px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.04); cursor: pointer; text-align: left; transition: box-shadow .2s, transform .2s; display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .class-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.1); transform: translateY(-2px); }
    .class-card-name { font-size: 20px; font-weight: 900; color: #0f172a; }
    .class-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .class-stat-box { padding: 10px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; }
    .class-stat-lbl { font-size: 9px; font-weight: 900; }
    .class-stat-val { font-size: 18px; font-weight: 900; line-height: 1.2; }
    .pct-row { display: flex; justify-content: space-between; font-size: 10px; font-weight: 900; color: #94a3b8; margin-bottom: 6px; }
    .pct-bar  { width: 100%; height: 8px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
    .pct-fill { height: 100%; background: #34d399; border-radius: 99px; transition: width .5s; }

    /* ── 출결 카드 ── */
    .att-card { background: #fff; border: 2px solid #fef3c7; border-radius: 28px; padding: 24px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: border-color .2s; }
    .att-card.present { border-color: #a7f3d0; }
    .att-card.absent  { border-color: #fecaca; }
    .att-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; margin-bottom: 16px; background: #f1f5f9; color: #94a3b8; }
    .att-avatar.present { background: #d1fae5; color: #059669; }
    .att-avatar.absent  { background: #fee2e2; color: #dc2626; }
    .att-name { font-weight: 900; color: #1e293b; margin-bottom: 20px; }
    .att-btns { display: flex; gap: 8px; width: 100%; }
    .att-btn { flex: 1; padding: 12px; border-radius: 14px; font-size: 12px; font-weight: 900; background: #f8fafc; color: #94a3b8; transition: all .15s; }
    .att-btn.btn-present.active { background: #10b981; color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,.3); }
    .att-btn.btn-absent.active  { background: #ef4444; color: #fff; box-shadow: 0 2px 8px rgba(239,68,68,.3); }

    /* ── 학생 관리 ── */
    .grade-section { border-radius: 32px; padding: 24px; border: 1px solid; }
    .grade-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .manage-class-card { background: #fff; border: 1px solid rgba(255,255,255,.8); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .manage-class-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .manage-class-name  { font-size: 12px; font-weight: 900; color: #1e293b; }
    .manage-class-count { font-size: 10px; font-weight: 700; color: #94a3b8; margin-top: 2px; }
    .add-btn { width: 32px; height: 32px; background: #0f172a; color: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: background .2s; flex-shrink: 0; }
    .add-btn:hover { background: #334155; }
    .student-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .student-tag { display: flex; align-items: center; gap: 4px; background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 10px; padding: 4px 8px; }
    .student-tag-name { font-size: 11px; font-weight: 700; color: #475569; }
    .student-tag-del { color: #cbd5e1; transition: color .15s; display: flex; }
    .student-tag-del:hover { color: #ef4444; }

    /* ── 리포트 ── */
    .search-bar { background: #fff; border: 1px solid #f1f5f9; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .search-input-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #cbd5e1; pointer-events: none; }
    .search-input { width: 100%; padding: 12px 40px; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; font-size: 13px; font-weight: 700; outline: none; transition: border-color .2s; color: #1e293b; }
    .search-input:focus { border-color: #fb923c; }
    .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #cbd5e1; display: flex; }
    .search-clear:hover { color: #64748b; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .filter-btn { padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 900; background: #f8fafc; color: #94a3b8; transition: all .15s; }
    .filter-btn:hover { background: #f1f5f9; }
    .filter-btn.f-all     { background: #0f172a; color: #fff; }
    .filter-btn.f-present { background: #10b981; color: #fff; }
    .filter-btn.f-absent  { background: #ef4444; color: #fff; }
    .filter-select { padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 900; background: #f8fafc; color: #94a3b8; border: 2px solid transparent; outline: none; transition: all .15s; cursor: pointer; }
    .filter-select.active { border-color: #6366f1; background: #eef2ff; color: #4338ca; }
    .filter-date { padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 900; background: #f8fafc; color: #94a3b8; border: 2px solid transparent; outline: none; transition: all .15s; }
    .filter-date.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .filter-tilde { font-size: 12px; font-weight: 900; color: #cbd5e1; }
    .clear-btn { display: flex; align-items: center; gap: 4px; padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 900; background: #f1f5f9; color: #64748b; transition: background .15s; }
    .clear-btn:hover { background: #e2e8f0; }
    .search-count { font-size: 11px; font-weight: 700; color: #94a3b8; border-top: 1px solid #f8fafc; padding-top: 8px; }
    .report-table-wrap { background: #fff; border: 1px solid #f1f5f9; border-radius: 28px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .report-table-scroll { overflow-x: auto; }
    .report-table thead tr { background: #f8fafc; border-bottom: 1px solid #f1f5f9; }
    .report-table th { padding: 16px 24px; font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .12em; white-space: nowrap; }
    .report-table tbody tr { border-bottom: 1px solid #f8fafc; transition: background .15s; }
    .report-table tbody tr:last-child { border-bottom: none; }
    .report-table tbody tr:hover { background: rgba(248,250,252,.7); }
    .report-table td { padding: 16px 24px; }
    .td-date  { font-size: 11px; font-weight: 700; color: #94a3b8; white-space: nowrap; }
    .td-name  { font-size: 12px; font-weight: 900; color: #1e293b; }
    .td-class { font-size: 11px; font-weight: 700; color: #64748b; white-space: nowrap; }
    .td-time  { font-size: 11px; font-weight: 700; color: #cbd5e1; white-space: nowrap; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 900; }
    .badge-present { background: #ecfdf5; color: #059669; }
    .badge-absent  { background: #fef2f2; color: #dc2626; }
    .empty-cell { padding: 64px 24px; text-align: center; font-weight: 700; color: #cbd5e1; }

    /* ── 뱃지 ── */
    .grade-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 10px; color: #fff; display: inline-block; }
    .unmarked-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 10px; background: #fef3c7; color: #d97706; animation: pulse 1.5s infinite; }

    /* ── 스티키바 ── */
    .sticky-bar { position: sticky; top: 0; z-index: 10; background: #fff; border: 1px solid #f1f5f9; border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .back-btn { width: 36px; height: 36px; border-radius: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .back-btn:hover { background: #f8fafc; }
    .sticky-title { font-weight: 900; color: #1e293b; }
    .sync-indicator { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: #94a3b8; }

    /* ── 빈 화면 ── */
    .empty-box { padding: 96px 24px; background: #fff; border: 2px dashed #e2e8f0; border-radius: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #cbd5e1; text-align: center; gap: 8px; }
    .empty-box p { font-weight: 700; font-size: 16px; }
    .empty-box span { font-size: 13px; }

    /* ── 모달 ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(15,23,42,.4); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; padding: 16px; }
    .modal-box { background: #fff; width: 100%; max-width: 400px; border-radius: 32px; padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,.15); animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1) both; }
    .modal-title { font-size: 20px; font-weight: 900; color: #0f172a; text-align: center; margin-bottom: 4px; }
    .modal-sub   { font-size: 12px; font-weight: 700; color: #94a3b8; text-align: center; margin-bottom: 28px; }
    .modal-input { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 18px; padding: 16px 20px; font-size: 15px; font-weight: 700; outline: none; transition: border-color .2s; margin-bottom: 20px; color: #0f172a; }
    .modal-input:focus { border-color: #fb923c; }
    .modal-btns { display: flex; gap: 8px; }
    .btn-cancel  { flex: 1; padding: 16px; font-size: 15px; font-weight: 900; color: #94a3b8; background: #f8fafc; border-radius: 18px; transition: background .15s; }
    .btn-cancel:hover  { background: #f1f5f9; }
    .btn-confirm { flex: 1; padding: 16px; font-size: 15px; font-weight: 900; color: #fff; background: #0f172a; border-radius: 18px; transition: background .15s; }
    .btn-confirm:hover { background: #1e293b; }
    .btn-danger  { flex: 1; padding: 16px; font-size: 15px; font-weight: 900; color: #fff; background: #ef4444; border-radius: 18px; transition: opacity .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-danger:disabled { opacity: .6; }
    .delete-icon-wrap { width: 56px; height: 56px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 200; padding: 12px 20px; border-radius: 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1) both; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .toast-success { background: #0f172a; color: #fff; }
    .toast-error   { background: #ef4444; color: #fff; }

    /* ── 로딩/에러 ── */
    .full-center { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: #f8fafc; padding: 32px; text-align: center; }
    .spinner { width: 44px; height: 44px; border: 4px solid #f97316; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; }
    .error-icon { width: 64px; height: 64px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ef4444; }

    /* ── 애니메이션 ── */
    @keyframes scaleIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.6} }
    .fade-in { animation: fadeIn .3s ease both; }
    .spin    { animation: spin .8s linear infinite; }

    /* ── 학년 색상 ── */
    .g1  { background:#fff1f2; border-color:#ffe4e6; } .g1t { color:#e11d48; } .g1a { background:#e11d48; }
    .g2  { background:#fff7ed; border-color:#ffedd5; } .g2t { color:#ea580c; } .g2a { background:#ea580c; }
    .g3  { background:#fffbeb; border-color:#fef3c7; } .g3t { color:#d97706; } .g3a { background:#d97706; }
    .g4  { background:#ecfdf5; border-color:#d1fae5; } .g4t { color:#059669; } .g4a { background:#059669; }
    .g5  { background:#eff6ff; border-color:#dbeafe; } .g5t { color:#2563eb; } .g5a { background:#2563eb; }
    .g6  { background:#eef2ff; border-color:#e0e7ff; } .g6t { color:#4f46e5; } .g6a { background:#4f46e5; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
        .sidebar { position: fixed; inset-y: 0; left: 0; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.08); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }
        .mobile-menu-btn { display: flex; }
        .main { padding: 20px 16px; padding-top: 72px; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); }
        .grid-2 { grid-template-columns: 1fr; }
        .header-title { font-size: 22px; }
        .modal-overlay { align-items: flex-end; }
    }
    @media (min-width: 769px)  { .modal-overlay { align-items: center; } }
    @media (min-width: 1024px) { .att-grid { grid-template-columns: repeat(3, 1fr) !important; } }
    @media (min-width: 1280px) { .att-grid { grid-template-columns: repeat(4, 1fr) !important; } }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

/* ━━━ ⚙️  배포 URL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzu2np9Ews-61awbMHi0OcSt0o9oCvTUFAa3WFrjWoByr3taHf_zML4d2TGr7h72Fe6Vw/exec';

const getKSTDate = (d = new Date()) =>
    new Date(d.getTime() + 9 * 3600 * 1000).toISOString().split('T')[0];
const parseLocalDate = str => {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
};
// ✅ 어떤 형식의 날짜든 yyyy-MM-dd 로 정규화
const normalizeDate = val => {
    if (!val) return '';
    const s = String(val).replace(/^'+/, ''); // 앞의 작은따옴표 제거
    // 이미 yyyy-MM-dd 형식이면 그대로 반환
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // ISO 문자열이면 앞 10자만
    if (s.length >= 10) return s.substring(0, 10);
    return s;
};

const api = {
    get:  action => fetch(`${SCRIPT_URL}?action=${action}`).then(r => r.json()),
    post: body   => fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(body) }).then(r => r.json()),
};

const GRADE_KEYS = ['1학년','2학년','3학년','4학년','5학년','6학년'];
const GRADE_CSS  = {'1학년':'g1','2학년':'g2','3학년':'g3','4학년':'g4','5학년':'g5','6학년':'g6'};
const ALL_CLASSES = (() => {
    const out = [];
    [1,2,3,4,5,6].forEach(g => {
        const grade = `${g}학년`;
        out.push(
            {id:`e${g}-mw-s`, name:`초등 ${g} 월목 (수업)`, grade, days:'월목', extra:false},
            {id:`e${g}-mw-h`, name:`초등 ${g} 월목 (학습)`, grade, days:'월목', extra:false},
            {id:`e${g}-hg-s`, name:`초등 ${g} 화금 (수업)`, grade, days:'화금', extra:false},
            {id:`e${g}-hg-h`, name:`초등 ${g} 화금 (학습)`, grade, days:'화금', extra:false},
            {id:`e${g}-mw-xs`, name:`초등 ${g} 월목 추가 (수업)`, grade, days:'월목', extra:true},
            {id:`e${g}-mw-xh`, name:`초등 ${g} 월목 추가 (학습)`, grade, days:'월목', extra:true},
            {id:`e${g}-hg-xs`, name:`초등 ${g} 화금 추가 (수업)`, grade, days:'화금', extra:true},
            {id:`e${g}-hg-xh`, name:`초등 ${g} 화금 추가 (학습)`, grade, days:'화금', extra:true},
        );
    });
    return out;
})();

const Toast = ({ message, type='success', onDone }) => {
    useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
    return <div className={`toast toast-${type}`}><Icon name={type==='success'?'check':'alert'} size={15}/>{message}</div>;
};

/* ── 리포트 뷰 ── */
const ReportView = ({ logs, students }) => {
    const [searchName,   setSearchName]   = useState('');
    const [filterStatus, setFilterStatus] = useState('ALL');
    const [filterGrade,  setFilterGrade]  = useState('ALL');
    const [dateFrom,     setDateFrom]     = useState('');
    const [dateTo,       setDateTo]       = useState('');

    const today = getKSTDate();

    // ✅ 오늘 기준을 UpdatedAt(기록시각) 기준으로 변경
    const todayLogs    = useMemo(() => logs.filter(l => {
        if (!l.UpdatedAt) return false;
        return normalizeDate(l.UpdatedAt) === today;
    }), [logs, today]);
    const todayPresent = useMemo(() => todayLogs.filter(l => l.Status === 'PRESENT').length, [todayLogs]);
    const todayAbsent  = useMemo(() => todayLogs.filter(l => l.Status === 'ABSENT').length,  [todayLogs]);

    // ✅ 필터도 UpdatedAt 기준
    const filtered = useMemo(() => logs.filter(log => {
        const student = students.find(s => s.ID === log.StudentID);
        const cls     = student ? ALL_CLASSES.find(c => c.id === student.ClassID) : null;
        if (searchName.trim() && !(student?.Name||'').includes(searchName.trim())) return false;
        if (filterStatus !== 'ALL' && log.Status !== filterStatus) return false;
        if (filterGrade  !== 'ALL' && cls?.grade  !== filterGrade)  return false;
        const logDate = log.UpdatedAt ? normalizeDate(log.UpdatedAt) : '';
        if (dateFrom && logDate < dateFrom) return false;
        if (dateTo   && logDate > dateTo)   return false;
        return true;
    }), [logs, students, searchName, filterStatus, filterGrade, dateFrom, dateTo]);

    const hasFilter = searchName || filterStatus !== 'ALL' || filterGrade !== 'ALL' || dateFrom || dateTo;
    const clearAll  = () => { setSearchName(''); setFilterStatus('ALL'); setFilterGrade('ALL'); setDateFrom(''); setDateTo(''); };

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20,paddingBottom:40}}>
            <div style={{fontSize:11,fontWeight:900,color:'#94a3b8',letterSpacing:'.1em'}}>
                TODAY · {today} 기준
            </div>
            <div className="grid-4">
                {[
                    {label:'오늘 출결 로그', val:todayLogs.length,    color:'#0f172a'},
                    {label:'오늘 출석',      val:todayPresent,         color:'#059669'},
                    {label:'오늘 결석',      val:todayAbsent,          color:'#dc2626'},
                    {label:'등록 학생',      val:students.length,      color:'#4f46e5'},
                ].map(item => (
                    <div key={item.label} className="card stat-card">
                        <div className="stat-label">{item.label}</div>
                        <div className="stat-val" style={{color:item.color}}>{item.val}</div>
                    </div>
                ))}
            </div>

            <div className="search-bar">
                <div className="search-input-wrap">
                    <svg className="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input className="search-input" type="text" placeholder="학생 이름으로 검색..."
                        value={searchName} onChange={e => setSearchName(e.target.value)} />
                    {searchName && <button className="search-clear" onClick={() => setSearchName('')}><Icon name="x" size={14}/></button>}
                </div>
                <div className="filter-row">
                    {[{val:'ALL',label:'전체',a:'f-all'},{val:'PRESENT',label:'출석',a:'f-present'},{val:'ABSENT',label:'결석',a:'f-absent'}].map(b => (
                        <button key={b.val} className={`filter-btn ${filterStatus===b.val?b.a:''}`} onClick={() => setFilterStatus(b.val)}>{b.label}</button>
                    ))}
                    <select className={`filter-select ${filterGrade!=='ALL'?'active':''}`} value={filterGrade} onChange={e => setFilterGrade(e.target.value)}>
                        <option value="ALL">전체 학년</option>
                        {GRADE_KEYS.map(g => <option key={g} value={g}>{g}</option>)}
                    </select>
                    <input className={`filter-date ${dateFrom?'active':''}`} type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
                    <span className="filter-tilde">~</span>
                    <input className={`filter-date ${dateTo?'active':''}`} type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} />
                    {hasFilter && <button className="clear-btn" onClick={clearAll}><Icon name="x" size={11}/> 초기화</button>}
                </div>
                <div className="search-count">
                    {hasFilter
                        ? <><span style={{color:'#f97316',fontWeight:900}}>{filtered.length}건</span> / 전체 {logs.length}건</>
                        : <>전체 <span style={{color:'#1e293b',fontWeight:900}}>{logs.length}건</span></>}
                    {hasFilter && filtered.length === 0 && <span style={{color:'#ef4444',marginLeft:12}}>검색 결과가 없습니다</span>}
                </div>
            </div>

            <div className="report-table-wrap">
                <div className="report-table-scroll">
                    <table className="report-table">
                        {/* ✅ 날짜 제거, 기록시각 맨 앞으로 */}
                        <thead><tr>{['기록시각','학생명','반','상태'].map(h => <th key={h}>{h}</th>)}</tr></thead>
                        <tbody>
                            {filtered.length === 0
                                ? <tr><td className="empty-cell" colSpan={4}>{hasFilter?'검색 조건에 맞는 기록이 없습니다':'출결 기록이 없습니다'}</td></tr>
                                : filtered.map(log => {
                                    const student = students.find(s => s.ID === log.StudentID);
                                    const cls     = student ? ALL_CLASSES.find(c => c.id === student.ClassID) : null;
                                    const name    = student?.Name || '—';
                                    const hi      = searchName.trim() && name.includes(searchName.trim())
                                        ? name.replace(searchName.trim(), `<mark style="background:#fef08a;border-radius:3px;padding:0 2px">${searchName.trim()}</mark>`)
                                        : null;
                                    return (
                                        <tr key={log.LogID}>
                                            <td className="td-time">{log.UpdatedAt ? new Date(log.UpdatedAt).toLocaleString('ko-KR') : '—'}</td>
                                            <td className="td-name">{hi ? <span dangerouslySetInnerHTML={{__html:hi}}/> : name}</td>
                                            <td className="td-class">{cls?.name||'—'}</td>
                                            <td><span className={`badge badge-${log.Status==='PRESENT'?'present':'absent'}`}>{log.Status==='PRESENT'?'출석':'결석'}</span></td>
                                        </tr>
                                    );
                                })
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
};

/* ━━━ 메인 앱 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const App = () => {
    const [students,      setStudents]      = useState([]);
    const [logs,          setLogs]          = useState([]);
    const [loading,       setLoading]       = useState(true);
    const [apiError,      setApiError]      = useState(null);
    const [syncing,       setSyncing]       = useState(false);
    const [viewMode,      setViewMode]      = useState('attendance');
    const [activeClassId, setActiveClassId] = useState(null);
    const [targetDate,    setTargetDate]    = useState(getKSTDate());
    const [activeGrade,   setActiveGrade]   = useState(null);
    const [activeDays,    setActiveDays]    = useState(null);
    const [sidebarOpen,   setSidebarOpen]   = useState(false);
    const [showAddModal,      setShowAddModal]      = useState(false);
    const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
    const [modalTargetClass,  setModalTargetClass]  = useState(null);
    const [newStudentName,    setNewStudentName]     = useState('');
    const [isDeleting,        setIsDeleting]         = useState(false);
    const [toast,             setToast]              = useState(null);
    const showToast = (message, type='success') => setToast({message, type});

    const loadAll = useCallback(async () => {
        setLoading(true); setApiError(null);
        try {
            const [s, l] = await Promise.all([api.get('getStudents'), api.get('getLogs')]);
            if (s.error) throw new Error(s.error);
            if (l.error) throw new Error(l.error);
            setStudents(Array.isArray(s) ? s : []);
            setLogs(Array.isArray(l) ? l : []);
        } catch(err) { setApiError('데이터를 불러오지 못했습니다.\nSCRIPT_URL을 확인해 주세요.\n' + err.message); }
        finally { setLoading(false); }
    }, []);
    useEffect(() => { loadAll(); }, []);

    const currentDay = useMemo(() => {
        const days = ['일','월','화','수','목','금','토'];
        return days[parseLocalDate(targetDate).getDay()];
    }, [targetDate]);

    const filteredClasses = useMemo(() => {
        if (['월','목'].includes(currentDay)) return ALL_CLASSES.filter(c => c.days === '월목');
        if (['화','금'].includes(currentDay)) return ALL_CLASSES.filter(c => c.days === '화금');
        return [];
    }, [currentDay]);

    const activeClass = ALL_CLASSES.find(c => c.id === activeClassId);
    const getStatus   = sid => logs.find(l => l.StudentID === sid && normalizeDate(l.Date) === targetDate)?.Status;

    const getClassStats = classId => {
        const cls = students.filter(s => s.ClassID === classId);
        let present=0, absent=0;
        cls.forEach(s => { const st=getStatus(s.ID); if(st==='PRESENT')present++; else if(st==='ABSENT')absent++; });
        return {total:cls.length, present, absent, unmarked:cls.length-present-absent};
    };

    const handleAttendance = async (studentId, status) => {
        const logId = `${studentId}-${targetDate}`;
        setLogs(prev => {
            const idx = prev.findIndex(l => l.LogID === logId);
            const newLog = {LogID:logId, StudentID:studentId, Date:targetDate, Status:status, UpdatedAt:new Date().toISOString()};
            if (idx >= 0) { const u=[...prev]; u[idx]=newLog; return u; }
            return [...prev, newLog];
        });
        setSyncing(true);
        try { await api.post({action:'setAttendance', studentId, date:targetDate, status}); }
        catch { showToast('저장 실패 — 네트워크를 확인해 주세요','error'); await loadAll(); }
        finally { setSyncing(false); }
    };

    const handleAddStudent = async () => {
        if (!newStudentName.trim()) return;
        try {
            const res = await api.post({action:'addStudent', name:newStudentName.trim(), classId:modalTargetClass.id});
            if (res.error) throw new Error(res.error);
            showToast(`${newStudentName.trim()} 학생이 등록되었습니다`);
            setNewStudentName(''); setShowAddModal(false); await loadAll();
        } catch(err) { showToast('등록 실패: '+err.message,'error'); }
    };

    const handleDeleteStudent = async student => {
        setIsDeleting(true);
        try {
            const res = await api.post({action:'deleteStudent', id:student.ID});
            if (res.error) throw new Error(res.error);
            showToast(`${student.Name} 학생이 삭제되었습니다`);
            setShowDeleteConfirm(null); await loadAll();
        } catch(err) { showToast('삭제 실패: '+err.message,'error'); }
        finally { setIsDeleting(false); }
    };

    if (apiError) return (
        <div className="full-center">
            <div className="error-icon"><Icon name="alert" size={32}/></div>
            <div style={{fontSize:20,fontWeight:900,color:'#0f172a'}}>연결 오류</div>
            <div style={{fontSize:13,color:'#64748b',maxWidth:320,lineHeight:1.7,whiteSpace:'pre-line'}}>{apiError}</div>
            <button onClick={loadAll} style={{display:'flex',alignItems:'center',gap:8,padding:'12px 24px',background:'#0f172a',color:'#fff',borderRadius:16,fontSize:14,fontWeight:700,marginTop:8}}>
                <Icon name="refresh" size={15}/> 다시 시도
            </button>
        </div>
    );
    if (loading) return (
        <div className="full-center">
            <div className="spinner"/>
            <div style={{fontWeight:700,color:'#94a3b8'}}>Google Sheets에서 불러오는 중...</div>
        </div>
    );

    return (
        <div className="app-shell">
            <div className={`sidebar-overlay ${sidebarOpen?'open':''}`} onClick={() => setSidebarOpen(false)}/>
            <button className="mobile-menu-btn" onClick={() => setSidebarOpen(v=>!v)}>
                <Icon name={sidebarOpen?'x':'menu'} size={22}/>
            </button>

            <aside className={`sidebar ${sidebarOpen?'open':''}`}>
                <div className="sidebar-logo">
                    <div className="logo-icon"><Icon name="sparkles" size={22}/></div>
                    <div><div className="logo-title">군위몰입수학</div><div className="logo-sub">출결관리 시스템</div></div>
                </div>
                <nav className="nav">
                    {[
                        {id:'attendance',label:'출결 체크',  icon:'user-check',active:'active-orange'},
                        {id:'manage',    label:'학생 관리',  icon:'settings',  active:'active-dark'},
                        {id:'report',    label:'출결 리포트',icon:'file-text', active:'active-indigo'},
                    ].map(btn => (
                        <button key={btn.id} className={`nav-btn ${viewMode===btn.id?btn.active:''}`}
                            onClick={() => {setViewMode(btn.id); setActiveClassId(null); setSidebarOpen(false);}}>
                            <Icon name={btn.icon} size={17}/> {btn.label}
                        </button>
                    ))}
                </nav>
                <div className="sidebar-footer">
                    <button className="refresh-btn" onClick={loadAll}>
                        <Icon name="refresh" size={14} cls={syncing?'spin':''}/>
                        {syncing ? '동기화 중...' : '새로고침'}
                    </button>
                    <div className="db-card">
                        <div className="db-card-label">Database</div>
                        <div className="db-card-val">Google Sheets</div>
                        <div className="db-card-sub">학생 {students.length}명 · 로그 {logs.length}건</div>
                    </div>
                    <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #f1f5f9'}}>
                        <div style={{fontSize:9,fontWeight:900,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}}>제작</div>
                        <div style={{fontSize:12,fontWeight:900,color:'#64748b'}}>티치포퓨터</div>
                        <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginTop:2}}>바이브코딩 연구소</div>
                    </div>
                </div>
            </aside>

            <main className="main">
                <div className="main-header">
                    <div>
                        <div className="header-eyebrow">{viewMode==='report'?'History':'Admin Panel'}</div>
                        <div className="header-title">
                            {viewMode==='manage'?'전체 분반 현황':viewMode==='report'?'전체 출결 기록':activeClassId?activeClass?.name:'학생 출결 관리'}
                        </div>
                    </div>
                    {viewMode !== 'report' && (
                        <div className="date-picker-bar">
                            <input type="date" value={targetDate} onChange={e => {setTargetDate(e.target.value); setActiveClassId(null);}}/>
                            <div className="date-divider"/>
                            <span className="day-badge">{currentDay}요일</span>
                        </div>
                    )}
                </div>

                {viewMode === 'attendance' && (
                    <div className="fade-in">
                        {!activeClassId ? (
                            ['월','목'].includes(currentDay) || ['화','금'].includes(currentDay) ? (
                            <div style={{display:'flex',flexDirection:'column',gap:24,paddingBottom:40}}>
                                {(() => {
                                    const dayFilter = ['월','목'].includes(currentDay) ? '월목' : '화금';
                                    const hasAny = ALL_CLASSES.some(c => c.days === dayFilter && getClassStats(c.id).total > 0);
                                    if (!hasAny) return (
                                        <div className="empty-box">
                                            <Icon name="user-plus" size={40} style={{opacity:.25}}/>
                                            <p>등록된 학생이 없습니다</p>
                                            <span>학생 관리 탭에서 학생을 먼저 추가해 주세요</span>
                                        </div>
                                    );
                                    return null;
                                })()}
                                {GRADE_KEYS.map(grade => {
                                    const gc = GRADE_CSS[grade];
                                    const dayFilter = ['월','목'].includes(currentDay) ? '월목' : '화금';
                                    const normalClasses = ALL_CLASSES.filter(c => c.grade === grade && c.days === dayFilter && !c.extra && getClassStats(c.id).total > 0);
                                    const extraClasses  = ALL_CLASSES.filter(c => c.grade === grade && c.days === dayFilter &&  c.extra && getClassStats(c.id).total > 0);
                                    const allGradeClasses = [...normalClasses, ...extraClasses];
                                    const totalUnmarked = allGradeClasses.reduce((sum, c) => sum + getClassStats(c.id).unmarked, 0);
                                    if (allGradeClasses.length === 0) return null;

                                    const renderClassCard = (c) => {
                                        const st  = getClassStats(c.id);
                                        const pct = st.total > 0 ? Math.round(st.present/st.total*100) : 0;
                                        const typeLabel = (c.id.endsWith('-s') || c.id.endsWith('-xs')) ? '수반' : '학반';
                                        const isExtra   = c.extra;
                                        return (
                                            <button key={c.id} className="class-card" style={{gap:12,padding:20,border: isExtra ? '2px solid #e0e7ff' : '1px solid #f1f5f9'}} onClick={() => setActiveClassId(c.id)}>
                                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                                                        {isExtra && <span style={{fontSize:9,fontWeight:900,padding:'2px 6px',borderRadius:6,background:'#6366f1',color:'#fff'}}>추가</span>}
                                                        <span style={{fontSize:13,fontWeight:900,color:'#0f172a'}}>{typeLabel}</span>
                                                    </div>
                                                    {st.unmarked > 0 && <span className="unmarked-badge" style={{fontSize:9,padding:'2px 7px'}}>미체크 {st.unmarked}</span>}
                                                </div>
                                                <div>
                                                    <div className="pct-row"><span>출석률</span><span>{pct}%</span></div>
                                                    <div className="pct-bar"><div className="pct-fill" style={{width:`${pct}%`}}/></div>
                                                </div>
                                                <div className="class-stats">
                                                    {[{label:'등록',val:st.total,bg:'#f8fafc',color:'#475569'},{label:'출석',val:st.present,bg:'#ecfdf5',color:'#059669'},{label:'결석',val:st.absent,bg:'#fef2f2',color:'#dc2626'}].map(item => (
                                                        <div key={item.label} className="class-stat-box" style={{background:item.bg}}>
                                                            <div className="class-stat-lbl" style={{color:item.color,opacity:.7}}>{item.label}</div>
                                                            <div className="class-stat-val" style={{color:item.color,fontSize:16}}>{item.val}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </button>
                                        );
                                    };

                                    return (
                                        <div key={grade}>
                                            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                                                <span className={`grade-badge ${gc}a`} style={{fontSize:13,padding:'5px 14px'}}>{grade}</span>
                                                {totalUnmarked > 0 && <span className="unmarked-badge">전체 미체크 {totalUnmarked}명</span>}
                                            </div>
                                            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,marginBottom: extraClasses.length > 0 ? 10 : 0}}>
                                                {normalClasses.map(renderClassCard)}
                                            </div>
                                            {extraClasses.length > 0 && (
                                                <>
                                                    <div style={{display:'flex',alignItems:'center',gap:8,margin:'10px 0 8px'}}>
                                                        <div style={{flex:1,height:1,background:'#e0e7ff'}}/>
                                                        <span style={{fontSize:10,fontWeight:900,color:'#6366f1',padding:'2px 10px',background:'#eef2ff',borderRadius:99}}>추가반</span>
                                                        <div style={{flex:1,height:1,background:'#e0e7ff'}}/>
                                                    </div>
                                                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
                                                        {extraClasses.map(renderClassCard)}
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            ) : (
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 24px',gap:20,textAlign:'center'}}>
                                <div style={{width:80,height:80,borderRadius:'50%',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <Icon name="calendar" size={40} style={{color:'#cbd5e1'}}/>
                                </div>
                                <div>
                                    <div style={{fontSize:20,fontWeight:900,color:'#94a3b8',marginBottom:8}}>금일 군위몰입수학 수업이 없습니다</div>
                                    <div style={{fontSize:14,fontWeight:700,color:'#cbd5e1'}}>수업일 : 월 · 화 · 목 · 금요일</div>
                                </div>
                                <div style={{marginTop:8,padding:'10px 20px',background:'#f8fafc',borderRadius:14,fontSize:13,fontWeight:700,color:'#94a3b8'}}>{currentDay}요일</div>
                            </div>
                        )
                        ) : (
                            <div>
                                <div className="sticky-bar">
                                    <button className="back-btn" onClick={() => setActiveClassId(null)}><Icon name="chevron-l" size={20}/></button>
                                    <div>
                                        <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:2}}>{activeClass?.grade}</div>
                                        <div className="sticky-title" style={{display:'flex',alignItems:'center',gap:6}}>
                                            {activeClass?.extra && <span style={{fontSize:10,fontWeight:900,padding:'1px 6px',borderRadius:6,background:'#6366f1',color:'#fff'}}>추가</span>}
                                            {activeClass ? `${activeClass.days} ${(activeClass.id.endsWith('-s')||activeClass.id.endsWith('-xs'))?'수반':'학반'}` : ''}
                                        </div>
                                    </div>
                                    {syncing && <div className="sync-indicator"><span style={{width:12,height:12,border:'2px solid #fb923c',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .8s linear infinite'}}/> 저장 중</div>}
                                </div>
                                {students.filter(s => s.ClassID === activeClassId).length === 0 ? (
                                    <div className="empty-box"><p>등록된 학생이 없습니다</p><span>학생 관리에서 추가해 주세요</span></div>
                                ) : (
                                    <div className="att-grid" style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16,paddingBottom:80}}>
                                        {students.filter(s => s.ClassID === activeClassId).map(student => {
                                            const status = getStatus(student.ID);
                                            const sc = status==='PRESENT'?'present':status==='ABSENT'?'absent':'';
                                            return (
                                                <div key={student.ID} className={`att-card ${sc}`}>
                                                    <div className={`att-avatar ${sc}`}>{student.Name?.[0]}</div>
                                                    <div className="att-name">{student.Name}</div>
                                                    <div className="att-btns">
                                                        <button className={`att-btn btn-present ${status==='PRESENT'?'active':''}`} onClick={() => handleAttendance(student.ID,'PRESENT')}>출석</button>
                                                        <button className={`att-btn btn-absent  ${status==='ABSENT' ?'active':''}`} onClick={() => handleAttendance(student.ID,'ABSENT')}>결석</button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                )}

                {viewMode === 'manage' && (
                    <div className="fade-in grid-2" style={{paddingBottom:80}}>
                        {GRADE_KEYS.map(grade => {
                            const gc = GRADE_CSS[grade];
                            return (
                                <div key={grade} className={`grade-section ${gc}`}>
                                    <div className={`grade-title ${gc}t`}><Icon name="graduation" size={20}/> {grade}</div>
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
                                        {ALL_CLASSES.filter(c => c.grade === grade).map(c => {
                                            const cs = students.filter(s => s.ClassID === c.id);
                                            return (
                                                <div key={c.id} className="manage-class-card">
                                                    <div className="manage-class-header">
                                                        <div><div className="manage-class-name">{c.name}</div><div className="manage-class-count">{cs.length}명</div></div>
                                                        <button className="add-btn" onClick={() => {setModalTargetClass(c); setShowAddModal(true);}}>
                                                            <Icon name="user-plus" size={13}/>
                                                        </button>
                                                    </div>
                                                    <div className="student-tags">
                                                        {cs.map(s => (
                                                            <div key={s.ID} className="student-tag">
                                                                <span className="student-tag-name">{s.Name}</span>
                                                                <button className="student-tag-del" onClick={() => setShowDeleteConfirm(s)}><Icon name="x" size={10}/></button>
                                                            </div>
                                                        ))}
                                                        {cs.length === 0 && <span style={{fontSize:11,color:'#cbd5e1',fontWeight:700}}>학생 없음</span>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}

                {viewMode === 'report' && <ReportView logs={logs} students={students}/>}
            </main>

            {showAddModal && (
                <div className="modal-overlay" onClick={e => e.target===e.currentTarget && (setShowAddModal(false),setNewStudentName(''))}>
                    <div className="modal-box">
                        <div className="modal-title">학생 등록</div>
                        <div className="modal-sub">{modalTargetClass?.name}</div>
                        <input autoFocus className="modal-input" type="text" placeholder="이름을 입력하세요"
                            value={newStudentName} onChange={e => setNewStudentName(e.target.value)}
                            onKeyDown={e => e.key==='Enter' && handleAddStudent()}/>
                        <div className="modal-btns">
                            <button className="btn-cancel" onClick={() => {setShowAddModal(false); setNewStudentName('');}}>취소</button>
                            <button className="btn-confirm" onClick={handleAddStudent}>등록</button>
                        </div>
                    </div>
                </div>
            )}

            {showDeleteConfirm && (
                <div className="modal-overlay" onClick={e => e.target===e.currentTarget && !isDeleting && setShowDeleteConfirm(null)}>
                    <div className="modal-box" style={{textAlign:'center'}}>
                        <div className="delete-icon-wrap"><Icon name="trash" size={24} style={{color:'#ef4444'}}/></div>
                        <div className="modal-title">학생 삭제</div>
                        <div style={{fontSize:14,fontWeight:700,color:'#64748b',marginBottom:6}}>{showDeleteConfirm.Name}</div>
                        <div style={{fontSize:12,color:'#ef4444',fontWeight:700,marginBottom:28}}>출결 기록도 함께 삭제되며 복구할 수 없습니다.</div>
                        <div className="modal-btns">
                            <button className="btn-cancel" onClick={() => setShowDeleteConfirm(null)} disabled={isDeleting}>취소</button>
                            <button className="btn-danger" onClick={() => handleDeleteStudent(showDeleteConfirm)} disabled={isDeleting}>
                                {isDeleting ? <><span style={{width:16,height:16,border:'2px solid #fff',borderTopColor:'transparent',borderRadius:'50%',display:'inline-block',animation:'spin .8s linear infinite'}}/> 삭제 중</> : '삭제'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {toast && <Toast {...toast} onDone={() => setToast(null)}/>}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
